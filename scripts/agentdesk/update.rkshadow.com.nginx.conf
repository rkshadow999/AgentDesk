server {
    listen 80;
    listen [::]:80;
    server_name update.rkshadow.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name update.rkshadow.com;

    ssl_certificate /etc/letsencrypt/live/update.rkshadow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/update.rkshadow.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/agentdesk-update;
    autoindex off;
    client_max_body_size 600m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Cross-Origin-Resource-Policy same-origin always;

    location = / {
        default_type text/plain;
        return 200 "AgentDesk update origin\n";
    }

    location /feed/ {
        alias /var/www/agentdesk-update/feed/;
        default_type application/octet-stream;
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location /releases/ {
        alias /var/www/agentdesk-update/releases/;
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location = /install {
        return 301 /install/;
    }

    location /install/ {
        alias /var/www/agentdesk-update/install/;
        index index.html;
        add_header Cache-Control "public, max-age=60" always;
    }

    location / {
        return 404;
    }
}
